name: Build and Test
description: Runs build

runs:
  using: "composite"
  steps:
    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.22.x
        cache-dependency-path: ./*.sum
    - name: Run build
      shell: bash
      run: make build
    - name: Check worktree clean
      uses: pulumi/git-status-check-action@0d90c81496aa8d6a31d9c6a0d6297feea2f54057 # v2
    - name: Run unit tests
      shell: bash
      run: make test
